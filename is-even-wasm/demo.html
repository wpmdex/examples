<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>is-even WASM demo</title>
</head>
<body>
  <h1>is-even WASM demo</h1>
  <p id="output">Loading...</p>

  <script type="module">
    import init, { is_even, is_odd } from "./pkg/is_even_wasm.js";

    await init();

    const results = [0, 1, 2, 3, -4, 7].map(n =>
      `is_even(${n}) = ${is_even(n)}, is_odd(${n}) = ${is_odd(n)}`
    );

    document.getElementById("output").innerText = results.join("\n");
  </script>
</body>
</html>
